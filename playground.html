<script>
// Tiny markdown renderer — deliberately dependency-free. Subset: headings, emphasis,
// code (inline + fenced), links, images, lists (incl. tasks, one nest level), quotes,
// tables, hr. Good enough to teach; not a spec implementation.
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function inline(s){
  s=esc(s);
  s=s.replace(/`([^`]+)`/g,(m,c)=>"<code>"+c+"</code>");
  s=s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g,'<img alt="$1" src="$2">');
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2">$1</a>');
  s=s.replace(/\*\*\*([^*]+)\*\*\*/g,"<strong><em>$1</em></strong>");
  s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  s=s.replace(/(^|\W)\*([^*\s][^*]*)\*/g,"$1<em>$2</em>");
  s=s.replace(/~~([^~]+)~~/g,"<del>$1</del>");
  return s;
}
function render(src){
  const lines=src.split(/\r?\n/); let out=[],i=0;
  while(i<lines.length){
    let l=lines[i];
    if(/^```/.test(l)){ let buf=[]; i++;
      while(i<lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++; out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>"); continue; }
    if(/^#{1,6}\s/.test(l)){ const n=l.match(/^#+/)[0].length;
      out.push(`<h${n}>`+inline(l.replace(/^#+\s*/,""))+`</h${n}>`); i++; continue; }
    if(/^(-{3,}|\*{3,})\s*$/.test(l)){ out.push("<hr>"); i++; continue; }
    if(/^>\s?/.test(l)){ let buf=[];
      while(i<lines.length && /^>\s?/.test(lines[i])) buf.push(lines[i++].replace(/^>\s?/,""));
      out.push("<blockquote>"+render(buf.join("\n"))+"</blockquote>"); continue; }
    if(/^\|.*\|/.test(l) && i+1<lines.length && /^\|[\s:|-]+\|/.test(lines[i+1])){
      const cells=r=>r.replace(/^\||\|$/g,"").split("|").map(c=>inline(c.trim()));
      let h="<tr>"+cells(l).map(c=>"<th>"+c+"</th>").join("")+"</tr>"; i+=2; let rows=[];
      while(i<lines.length && /^\|.*\|/.test(lines[i]))
        rows.push("<tr>"+cells(lines[i++]).map(c=>"<td>"+c+"</td>").join("")+"</tr>");
      out.push("<table><thead>"+h+"</thead><tbody>"+rows.join("")+"</tbody></table>"); continue; }
    if(/^(\s*)([-*]|\d+\.)\s/.test(l)){
      const ord=/^\s*\d+\./.test(l); let items=[];
      while(i<lines.length && /^(\s*)([-*]|\d+\.)\s/.test(lines[i])){
        let m=lines[i]; const nested=/^\s{2,}/.test(m);
        m=m.replace(/^\s*([-*]|\d+\.)\s/,"");
        let li=m.replace(/^\[([ xX])\]\s*/,(mm,c)=>`<input type="checkbox" disabled ${c!==" "?"checked":""}> `);
        li=li.startsWith("<input")? li.split(/> (.*)/s).length>1 ? li.replace(/> (.*)/s,(mm,r)=>"> "+inline(r)) : li : inline(li);
        items.push({nested, html:li});
        i++;
      }
      let html="",depth=0;
      const open=ord?"<ol>":"<ul>", close=ord?"</ol>":"</ul>";
      html+=open;
      items.forEach(it=>{
        if(it.nested&&depth===0){html+=open;depth=1}
        if(!it.nested&&depth===1){html+=close;depth=0}
        html+="<li>"+it.html+"</li>";
      });
      if(depth===1)html+=close;
      html+=close;
      out.push(html); continue; }
    if(/^\s*$/.test(l)){ i++; continue; }
    { let buf=[l]; i++;
      while(i<lines.length && !/^\s*$/.test(lines[i]) && !/^(#|>|```|\||[-*]\s|\d+\.\s|(-{3,})$)/.test(lines[i])) buf.push(lines[i++]);
      out.push("<p>"+buf.map(inline).join("<br>")+"</p>"); }
  }
  return out.join("\n");
}
const inEl=document.getElementById("in"), outEl=document.getElementById("out");
function update(){ outEl.innerHTML=render(inEl.value); }
inEl.addEventListener("input", update); update();
</script>
